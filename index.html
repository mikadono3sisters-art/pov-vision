<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POV Vision</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">POV Vision</div>
    <ul class="nav-links">
        <li><a href="#social">SNS</a></li>
    </ul>
</nav>

<main id="vlogs" class="vlogs">
    <div class="card-grid">

        <div class="card">
            <video class="video-preview" muted loop playsinline>
                <source src="videos/video1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="card">
            <video class="video-preview" muted loop playsinline>
                <source src="videos/video2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="card">
            <video class="video-preview" muted loop playsinline>
                <source src="videos/video3.mp4" type="video/mp4">
            </video>
        </div>

    </div>
</main>

<footer id="social">
    <div class="social-links">
        <a href="https://www.tiktok.com/@mikadono3sisters" target="_blank" rel="noopener">TikTok</a>
        <a href="https://www.instagram.com/@mikadono3sisters" target="_blank" rel="noopener">Instagram</a>
    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
